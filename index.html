<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skapa konto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="logo">BONNIER<br>NEWS</div>

  <div class="card">
    <h1>Få tillgång till ditt digitala konto</h1>

    <div id="error-msg"></div>

    <form id="account-form" novalidate>
      <div class="form-group">
        <label for="customer-number">Ditt kundnummer</label>
        <input type="text" id="customer-number" name="customerNumber" placeholder="abc12398765" readonly />
      </div>

      <p class="hint-text">Ange den e-postadress som du vill använda till ditt konto/inlogg</p>

      <div class="form-group">
        <label for="email">E-postadress</label>
        <input type="email" id="email" name="email" autocomplete="email" />
      </div>


<div class="checkbox-group">
        <input type="checkbox" id="terms" name="terms" />
        <label for="terms">
          Jag bekräftar att jag har tagit del av Bonnier News
          <a href="#" target="_blank">personuppgiftspolicy</a> och
          <a href="#" target="_blank">användarvillkor</a>
        </label>
      </div>

      <button type="submit" id="submit-btn" disabled>Skapa konto</button>
    </form>

    <div id="success-msg">
      Tack! Ditt konto håller på att skapas.<br>Vi hör av oss snart.
    </div>

    <a href="#" class="cancel-link" id="cancel-link">Avbryt</a>
  </div>

  <script src="app.js"></script>
</body>
</html>
